# ==========================================
# GitVerse — CI Pipeline
# ==========================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================
  # Lint & Type Check (Web)
  # ==========================================
  lint-web:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: ESLint
        run: npx turbo lint

  # ==========================================
  # Unit Tests (Web)
  # ==========================================
  test-web:
    name: Unit Tests (Web)
    runs-on: ubuntu-latest
    needs: lint-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npx turbo test

  # ==========================================
  # Lint & Test (Python API)
  # ==========================================
  test-api:
    name: Lint & Test (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Ruff lint
        run: cd apps/api && ruff check .

      - name: Run tests
        run: cd apps/api && python -m pytest tests/ -v
        continue-on-error: true

  # ==========================================
  # Build (Web)
  # ==========================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-web, test-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npx turbo build --filter=@gitverse/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # ==========================================
  # Docker Build (Release)
  # ==========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, test-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Web Image
        run: docker build -f docker/Dockerfile.web -t gitverse-web:latest .

      - name: Build API Image
        run: docker build -f docker/Dockerfile.api -t gitverse-api:latest .
